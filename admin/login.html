<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recantos da Serra Admin</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="admin.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--font-body);
        }

        .login-card {
            background: var(--bg-white);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card .logo {
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            font-family: var(--font-heading);
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo">
            <i class="ph ph-mountains"></i> Recantos da Serra
        </div>
        <h2 style="margin-bottom: 1.5rem; color: var(--text-dark);">Acesso Administrativo</h2>

        <div id="loginError" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="admin@admin.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; font-size: 1.1rem; padding: 0.75rem;">
                Entrar no Painel <i class="ph ph-sign-in"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            const submitBtn = e.target.querySelector('button');

            try {
                submitBtn.textContent = 'Autenticando...';
                submitBtn.disabled = true;

                const res = await fetch('../api/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok && data.status === 'success') {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminRole', data.role);
                    localStorage.setItem('adminName', data.name || '');
                    localStorage.setItem('adminPermissions', data.permissions ? JSON.stringify(data.permissions) : '');
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.error || 'Erro ao fazer login';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Falha de comunicação com o servidor.';
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.innerHTML = 'Entrar no Painel <i class="ph ph-sign-in"></i>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
